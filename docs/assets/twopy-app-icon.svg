<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title>twopy app icon prototype</title>
  <desc>A centered vector microscope objective on a warm app icon background.</desc>
  <defs>
    <linearGradient id="bg" x1="148" y1="92" x2="876" y2="948" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e6eeee"/>
      <stop offset=".7" stop-color="#dce4e1"/>
      <stop offset="1" stop-color="#cbd3d0"/>
    </linearGradient>
    <linearGradient id="teal-x" x1="160" y1="0" x2="864" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#052b32"/>
      <stop offset=".22" stop-color="#0b4c55"/>
      <stop offset=".5" stop-color="#1b7279"/>
      <stop offset=".78" stop-color="#0a4650"/>
      <stop offset="1" stop-color="#031d24"/>
    </linearGradient>
    <linearGradient id="teal-y" x1="0" y1="210" x2="0" y2="870" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c515b"/>
      <stop offset=".28" stop-color="#07313a"/>
      <stop offset=".52" stop-color="#0e5962"/>
      <stop offset=".78" stop-color="#07333b"/>
      <stop offset="1" stop-color="#062e36"/>
    </linearGradient>
    <radialGradient id="center-light" cx="50%" cy="46%" r="57%">
      <stop offset="0" stop-color="#4bb0af" stop-opacity=".42"/>
      <stop offset=".48" stop-color="#0b4b54" stop-opacity=".04"/>
      <stop offset="1" stop-color="#021820" stop-opacity=".22"/>
    </radialGradient>
    <linearGradient id="band" x1="264" y1="542" x2="760" y2="570" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff5c35"/>
      <stop offset=".5" stop-color="#ff9a67"/>
      <stop offset="1" stop-color="#ff5734"/>
    </linearGradient>
    <radialGradient id="glass" cx="52%" cy="45%" r="72%">
      <stop offset="0" stop-color="#c4fff8"/>
      <stop offset=".36" stop-color="#23858a"/>
      <stop offset="1" stop-color="#031a20"/>
    </radialGradient>
    <radialGradient id="sample-fill" cx="50%" cy="38%" r="72%">
      <stop offset="0" stop-color="#b7fff6"/>
      <stop offset=".42" stop-color="#55c9ca"/>
      <stop offset="1" stop-color="#286f7a"/>
    </radialGradient>
    <linearGradient id="sample-edge" x1="162" y1="214" x2="862" y2="914" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9dcfd0"/>
      <stop offset=".52" stop-color="#64838c"/>
      <stop offset="1" stop-color="#334856"/>
    </linearGradient>
    <filter id="sample-shadow" x="-24%" y="-24%" width="148%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#06343a" flood-opacity=".2"/>
    </filter>
    <filter id="drop" x="-18%" y="-18%" width="136%" height="142%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#09292f" flood-opacity=".2"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="214" fill="url(#bg)"/>

