    <path d="M146 271c0-24 15-46 37-55l286-124c27-12 59-12 86 0l286 124c22 9 37 31 37 55v497c0 24-15 46-37 55L555 946c-27 12-59 12-86 0L183 823c-22-9-37-31-37-55z" fill="url(#sample-edge)"/>
    <path d="M216 265c10 5 25 4 40-3l230-120c17-7 35-7 52 0l230 120c15 7 30 8 40 3L538 389c-17 7-35 7-52 0z" fill="url(#sample-fill)"/>
    <path d="M216 265v471l270 123c17 7 35 7 52 0l270-123V265L538 389c-17 7-35 7-52 0z" fill="url(#sample-edge)" opacity=".68"/>
    <path d="M263 295 490 197c14-6 30-6 44 0l227 98-227 99c-14 6-30 6-44 0z" fill="#d7fff9" opacity=".28"/>
    <circle cx="512" cy="303" r="38" fill="#c8fff9" opacity=".5"/>
    <path d="M512 303c-77-44-147-49-216-17M512 303c77-44 147-47 216-14M512 303v92" fill="none" stroke="#d7fff9" stroke-width="8" stroke-linecap="round" opacity=".26"/>
  </g>

