    <path d="M252 392h520v126c0 18-13 34-31 38-151 27-307 27-458 0-18-4-31-20-31-38z" fill="url(#teal-y)"/>
    <path d="M252 392h520v82c-173 22-347 22-520 0z" fill="#1b737a" opacity=".15"/>
    <path d="M252 519c171 25 349 25 520 0" stroke="#021820" stroke-width="13" opacity=".62"/>
    <path d="M252 398h520" stroke="#031b22" stroke-width="13" opacity=".58"/>

    <path d="M266 543c164 30 328 30 492 0v78c0 42-34 76-76 76H342c-42 0-76-34-76-76z" fill="url(#teal-y)"/>
    <path d="M278 617c156 22 312 22 468 0" stroke="#22757b" stroke-width="6" opacity=".24"/>

    <path d="M307 670c137 27 273 27 410 0l-80 92c-23 26-56 41-91 41h-68c-35 0-68-15-91-41z" fill="url(#teal-y)"/>
    <path d="M333 694c119 22 239 22 358 0" stroke="#1e7a80" stroke-width="5" opacity=".45"/>
    <path d="M389 734c82 14 164 14 246 0l-25 28c-18 21-45 33-72 33h-52c-27 0-54-12-72-33z" fill="#041d25" opacity=".2"/>

    <path d="M414 770c66 11 130 11 196 0l-15 32c-8 17-25 27-44 27h-78c-19 0-36-10-44-27z" fill="url(#glass)"/>
    <path d="M431 799c55 8 107 8 162 0" stroke="#c2fff8" stroke-width="8" stroke-linecap="round" opacity=".82"/>
    <path d="M450 819c42 5 82 5 124 0" stroke="#062b33" stroke-width="7" stroke-linecap="round" opacity=".54"/>

    <path d="M160 224h704v88c0 51-42 93-93 93H253c-51 0-93-42-93-93z" fill="url(#center-light)"/>
    <path d="M252 392h520v126c0 18-13 34-31 38-151 27-307 27-458 0-18-4-31-20-31-38z" fill="url(#center-light)"/>
    <path d="M266 543c164 30 328 30 492 0v78c0 42-34 76-76 76H342c-42 0-76-34-76-76z" fill="url(#center-light)" opacity=".72"/>
    <path d="M307 670c137 27 273 27 410 0l-80 92c-23 26-56 41-91 41h-68c-35 0-68-15-91-41z" fill="url(#center-light)" opacity=".62"/>

    <path d="M268 543c163 28 325 28 488 0v22c-163 29-325 29-488 0z" fill="url(#band)"/>
    <path d="M278 562c156 25 312 25 468 0" fill="none" stroke="#ffc19a" stroke-width="3" stroke-linecap="round" opacity=".78"/>
  </g>
</svg>
