# Copy this file to config.yml before running twopy:
#
#   cp config.example.yml config.yml
#
# Then edit config.yml so the paths match your machine.
# config.yml is private to your computer and must not be committed.

# Folder that contains the lab database files.
# twopy uses this to find and filter experiments.
# Example files inside this folder may include experimentLog.db and
# experimentInitLog.db.
database_path: /Volumes/magic/clarklab/_Database

# Folders that contain the two-photon microscope recording folders.
# twopy checks them in order when a database row could exist on more than one
# volume. The first existing recording wins.
data_paths:
  - /Volumes/magic/clarklab/2p_microscope_data
  - /Volumes/archive/clarklab/2p_microscope_data

# How twopy should read the database.
# Use "copy" for normal work. Database searches over the network can be slow,
# but copying the database file is usually fast. twopy makes a local copy before
# reading, then only copies again when the database file changed.
# Use "direct" only when you intentionally want to read the shared database
# files directly.
database_access: copy

# Whether twopy should keep converted recordings and analysis work on local
# storage while using analysis_output as the publish/sync destination.
# Use true for normal work with recordings on a network volume.
analysis_caching: true

# Local folder for cached converted recordings, ROIs, and analysis outputs.
# twopy mirrors recording paths below the matched data_paths root under this
# folder.
analysis_cache_dir: ~/.cache/twopy/recordings

# Optional alternative dated CSV registry for microscope pixel-size calibration.
# Omit this to use twopy's tracked default calibration registry.
# pixel_calibration_path: /path/to/alternative_pixel_size.csv

# Optional Python files or folders with extra custom workflows.
# twopy always lists its built-in workflows, including Direction selectivity.
# Workflow files are trusted local Python code. twopy checks their metadata
# before listing them and records workflow version/source hash with outputs.
# custom_workflow_paths:
#   - ~/git/twopy-workflows
#   - /Volumes/magic/clarklab/shared/twopy_workflows

# Where twopy should write converted data and analysis outputs.
# With analysis_caching enabled, this is the publish location used after saving.
# Use "source" to publish into a twopy folder inside each recording folder.
# Example: /path/to/recording/twopy
#
# Or set this to a folder path. twopy will recreate the matching recording
# folders under that folder.
# Example: /Volumes/magic/clarklab/twopy_outputs
analysis_output: source
