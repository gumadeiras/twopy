# Defines the local development environment for twopy.
# Inputs: conda-forge package metadata.
# Outputs: a micromamba environment named "twopy" with Python 3.13 and pip.
name: twopy
channels:
  - conda-forge
dependencies:
  - python=3.13
  - pip
  - pip:
      - -e .
      - furo>=2025.7,<2026
      - myst-parser>=4,<5
      - sphinx>=8,<9
